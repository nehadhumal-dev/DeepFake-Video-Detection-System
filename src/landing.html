<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Detect Fake Content</title>
  <link rel="stylesheet" href="landing.css?v=2"> <!-- 🔥 cache fix -->
</head>

<body>

<!-- 🔥 AI SCANNING OVERLAY -->
<div id="scanOverlay">
  <div class="scanner-box">
    <div class="scan-line"></div>
    <p>Analyzing Content...</p>
  </div>
</div>

<!-- 🔥 MAIN CARD -->
<div class="glass-card">

  <h1>Detect Fake Content</h1>

  <!-- TYPE SELECT -->
  <div class="type-select">
    <button onclick="selectType('image')" id="imgBtn">Upload Image</button>
    <button onclick="selectType('video')" id="vidBtn">Upload Video</button>
  </div>

  <!-- FILE INPUT -->
  <input type="file" id="fileInput" hidden>

  <!-- UPLOAD BUTTON -->
  <button class="upload-btn" onclick="uploadFile()">Choose File</button>

  <!-- FILE NAME -->
  <p id="fileName"></p>

  <!-- DETECT BUTTON -->
  <button class="detect-btn" onclick="startScan()">Detect</button>

  <!-- RESULT -->
  <div id="resultBox"></div>

</div>

<script>
let selectedType = "";
let selectedFile = null;

/* SELECT TYPE */
function selectType(type) {
  selectedType = type;

  document.getElementById("imgBtn").classList.remove("active");
  document.getElementById("vidBtn").classList.remove("active");

  if(type === "image") {
    document.getElementById("imgBtn").classList.add("active");
    document.querySelector(".upload-btn").innerText = "Upload Image";
  } else {
    document.getElementById("vidBtn").classList.add("active");
    document.querySelector(".upload-btn").innerText = "Upload Video";
  }
}

/* OPEN FILE */
function uploadFile() {
  document.getElementById("fileInput").click();
}

/* STORE FILE */
document.getElementById("fileInput").addEventListener("change", function() {
  selectedFile = this.files[0];
  document.getElementById("fileName").innerText = selectedFile.name;
});

/* 🔥 MAIN DETECTION FUNCTION */
async function startScan() {

  if (!selectedFile || !selectedType) {
    alert("Please select type and upload file");
    return;
  }

  const overlay = document.getElementById("scanOverlay");
  overlay.classList.add("active");

  const formData = new FormData();
  let url = "";

  if (selectedType === "image") {
    formData.append("image", selectedFile);
    url = "http://localhost:5000/detect-image";
  } else {
    formData.append("video", selectedFile);
    url = "http://localhost:5000/detect-video";
  }

  try {
    const response = await fetch(url, {
      method: "POST",
      body: formData
    });

    const data = await response.json();
    overlay.classList.remove("active");

    let resultHTML = "";

    // 🔥 IMAGE RESULT (PREMIUM)
    if (data.label) {

      const isFake = data.label.toLowerCase().includes("artificial");

      resultHTML = `
        <div class="result-card ${isFake ? 'fake' : 'real'}">

          <h2>${data.label.toUpperCase()}</h2>

          <div class="confidence-bar">
            <div class="confidence-fill" style="width:${data.confidence}%"></div>
          </div>

          <p class="confidence-text">Confidence: ${data.confidence}%</p>

          <p class="explanation">${data.explanation}</p>

          <div class="image-grid">
            <div>
              <h4>Original</h4>
              <img src="${URL.createObjectURL(selectedFile)}">
            </div>

            <div>
              <h4>AI Focus (Heatmap)</h4>
              <img src="data:image/png;base64,${data.heatmap}">
            </div>
          </div>

        </div>
      `;
    } 
    
    // 🎥 VIDEO RESULT
    else {

      const isFake = data.result.toLowerCase().includes("ai");

      resultHTML = `
        <div class="result-card ${isFake ? 'fake' : 'real'}">

          <h2>${data.result}</h2>

          <div class="confidence-bar">
            <div class="confidence-fill" style="width:${data.confidence}%"></div>
          </div>

          <p class="confidence-text">Confidence: ${data.confidence}%</p>

          <p class="explanation">${data.explanation}</p>

        </div>
      `;
    }

    document.getElementById("resultBox").innerHTML = resultHTML;

  } catch (error) {
    overlay.classList.remove("active");
    console.error(error);
    alert("Error connecting to backend");
  }
}
</script>

</body>
</html>
